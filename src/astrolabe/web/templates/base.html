<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Astrolabe{% endblock %}</title>
    <link rel="stylesheet" href="/static/pico.min.css">
    <link rel="stylesheet" href="/static/app.css?v={{ version }}">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <header class="site-header">
        <div class="header-left">
            <a href="/" class="header-brand"><strong>Astrolabe-MCP</strong> <small>v{{ version }}</small></a>
            <a href="/" class="header-link">Dashboard</a>
            <a href="/cards" class="header-link">Cards</a>
            <form action="/search" method="get" class="header-search">
                <input type="text" name="q" placeholder="Search...">
            </form>
        </div>
        <div class="header-right">
            <button class="hbtn hbtn-primary" hx-post="/api/refresh" hx-target="#toast-container" hx-swap="innerHTML" title="Re-read index from storage file">Reload index</button>
            <button class="hbtn hbtn-primary" hx-post="/api/reindex" hx-vals='{"mode": "update"}' hx-target="#toast-container" hx-swap="innerHTML" title="Rescan filesystem, update file metadata">Reindex</button>
            <button class="hbtn hbtn-muted" onclick="if(confirm('Removes cards for files that no longer exist on disk. Continue?')) htmx.ajax('POST', '/api/reindex', {target:'#toast-container', swap:'innerHTML', values:{mode:'clean'}})" title="Remove cards for deleted/moved files">Clean desync</button>
            <button class="hbtn hbtn-danger" onclick="if(confirm('WARNING: This will DELETE ALL ENRICHMENT — types, summaries, keywords, headings. All cards will become empty. This cannot be undone.\n\nAre you sure?')) htmx.ajax('POST', '/api/reindex', {target:'#toast-container', swap:'innerHTML', values:{mode:'rebuild'}})" title="DANGER: Reset all enrichment data">Rebuild</button>
        </div>
    </header>

    <main class="container">
        <div id="toast-container"></div>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
