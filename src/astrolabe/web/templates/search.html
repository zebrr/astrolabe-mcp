{% extends "base.html" %}
{% block title %}Astrolabe — Search{% endblock %}

{% block content %}
<h3>Search{% if query %}: <span class="subtitle">{{ query }}</span>{% endif %}</h3>

<form hx-post="/api/search" hx-target="#search-results" hx-swap="innerHTML"
      hx-trigger="submit, keyup changed delay:300ms from:#search-query">
    <div class="grid">
        <input type="text" name="query" id="search-query"
               placeholder="Search documents..." value="{{ query or '' }}" autofocus>
        <button type="submit">Search</button>
    </div>
</form>

<div id="search-results">
    {% if query %}
        {% include "partials/search_results.html" %}
    {% else %}
        <p>Enter a search query.</p>
    {% endif %}
</div>
{% endblock %}
